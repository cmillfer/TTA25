# App Hosting prunes unrecognized framework build output (Vite) unless
# explicitly kept in the Cloud Run bundle.
outputFiles:
  serverApp:
    include:
      - dist
      - superstatic.json
      - package.json
      - node_modules

scripts:
  runCommand: node node_modules/superstatic/lib/bin/server.js dist --port $PORT --host 0.0.0.0 -c superstatic.json

env:
  - variable: VITE_YOUTUBE_API_KEY
    secret: viteYoutubeApiKey
    availability:
      - BUILD
  - variable: GEMINI_API_KEY
    secret: geminiApiKey
    availability:
      - BUILD
