# App Hosting prunes unrecognized framework build output (Vite) unless
# explicitly kept in the Cloud Run bundle.
outputFiles:
  serverApp:
    include:
      - .

scripts:
  runCommand: node server.mjs

env:
  - variable: VITE_YOUTUBE_API_KEY
    secret: viteYoutubeApiKey
    availability:
      - BUILD
  - variable: GEMINI_API_KEY
    secret: geminiApiKey
    availability:
      - BUILD
