# App Hosting prunes unrecognized framework build output (Vite) unless
# explicitly kept. Include the full app root so dist/ survives deploy.
outputFiles:
  serverApp:
    include:
      - .

env:
  - variable: VITE_YOUTUBE_API_KEY
    secret: viteYoutubeApiKey
    availability:
      - BUILD
  - variable: GEMINI_API_KEY
    secret: geminiApiKey
    availability:
      - BUILD
