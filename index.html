        60% { transform: translate(15%, 0%); }
        70% { transform: translate(0%, 15%); }
        80% { transform: translate(3%, 35%); }
        90% { transform: translate(-10%, 10%); }

    .glitch {
        position: relative;
        color: white;
        text-shadow: 0 0 5px #D22B2B, 0 0 10px #D22B2B;
        animation: glitch-skew 1s infinite linear alternate-reverse;
    }
    .glitch::before,
    .glitch::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
    }
    .glitch::before {
        left: 2px;
        text-shadow: -2px 0 #D22B2B;
        clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
        animation:
            glitch-anim-1 var(--glitch-duration-1, 2.5s) infinite linear alternate-reverse;
    }
    .glitch::after {
        left: -2px;
        text-shadow: -2px 0 #2E8B57, 2px 2px #D22B2B;
        clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
        animation:
            glitch-anim-2 var(--glitch-duration-2, 1.5s) infinite linear alternate-reverse;
    }

    @keyframes glitch-anim-1 {
        0% { clip-path: polygon(0 2%, 100% 2%, 100% 33%, 0 33%); }
        25% { clip-path: polygon(0 40%, 100% 40%, 100% 40%, 0 40%); }
        50% { clip-path: polygon(0 60%, 100% 60%, 100% 20%, 0 20%); }
        75% { clip-path: polygon(0 80%, 100% 80%, 100% 50%, 0 50%); }
        100% { clip-path: polygon(0 70%, 100% 70%, 100% 80%, 0 80%); }
    }

    @keyframes glitch-anim-2 {
        0% { clip-path: polygon(0 67%, 100% 67%, 100% 98%, 0 98%); }
        25% { clip-path: polygon(0 15%, 100% 15%, 100% 35%, 0 35%); }
        50% { clip-path: polygon(0 45%, 100% 45%, 100% 75%, 0 75%); }
        75% { clip-path: polygon(0 55%, 100% 55%, 100% 85%, 0 85%); }
        100% { clip-path: polygon(0 25%, 100% 25%, 100% 55%, 0 55%); }
    }

    @keyframes glitch-skew {
        0% { transform: skew(0deg); }
        10% { transform: skew(1deg); }
        20% { transform: skew(-1deg); }
        30% { transform: skew(2deg); }
        40% { transform: skew(-2deg); }
        50% { transform: skew(0deg); }
        60% { transform: skew(1.5deg); }
        70% { transform: skew(-1.5deg); }
        80% { transform: skew(0.5deg); }
        90% { transform: skew(-0.5deg); }
        100% { transform: skew(0deg); }
    }
    
    .neon-text {
        text-shadow: 0 0 5px #D22B2B, 0 0 10px #D22B2B, 0 0 20px #D22B2B, 0 0 40px #D22B2B;
    }

    /* EKG Animation */
    @keyframes draw-ekg {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }
    
    .ekg-line {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
    }
    
    .ekg-line::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 2px;
        background: rgba(46, 139, 87, 0.2); /* Dark green trace */
        transform: translateY(-50%);
    }

    .ekg-blip {
        position: absolute;
        top: 50%;
        left: 0;
        width: 200px; /* Width of the "active" blip */
        height: 100px;
        transform: translateY(-50%) translateX(-200px);
        background: linear-gradient(90deg, transparent 0%, #2E8B57 50%, transparent 100%);
        clip-path: polygon(0 50%, 20% 50%, 30% 20%, 40% 80%, 50% 10%, 60% 90%, 70% 50%, 100% 50%);
        animation: ekg-move 2s infinite linear;
        filter: drop-shadow(0 0 5px #2E8B57);
    }

    @keyframes ekg-move {
        0% { left: -20%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { left: 120%; opacity: 0; }
    }
